{% extends "base.html" %}
{% block body %}
<main class="login-shell player-lookup">
  <form class="login-card" method="post">
    <h1>Плеер ТВ</h1>
    <p>Введите код экрана</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="notice error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <label>
      Код экрана
      <input name="screen_key" inputmode="numeric" pattern="[0-9]{4}" minlength="4" maxlength="4" autocomplete="off" required autofocus>
    </label>
    <button type="submit">Открыть плеер</button>
  </form>
</main>
{% endblock %}
