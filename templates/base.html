<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Signage" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% macro brand(title, subtitle=None) -%}
    <div class="brand">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="ИНП">
      <div>
        <strong>{{ title }}</strong>
        {% if subtitle %}
          <span>{{ subtitle }}</span>
        {% endif %}
      </div>
    </div>
  {%- endmacro %}
  {% macro upload_progress() -%}
    <div class="upload-progress hidden" aria-live="polite">
      <div class="upload-progress-bar">
        <span></span>
      </div>
      <div class="upload-progress-text">Подготовка загрузки...</div>
    </div>
  {%- endmacro %}
  {% macro media_filters() -%}
    <div class="list-tools" data-filter-controls>
      <input type="search" data-filter-search placeholder="Поиск по названию">
      <div class="segmented" role="group" aria-label="Фильтр файлов">
        <button type="button" class="active" data-filter-kind="all">Все</button>
        <button type="button" data-filter-kind="video">Видео</button>
        <button type="button" data-filter-kind="image">Фото</button>
      </div>
    </div>
  {%- endmacro %}
  {% block body %}{% endblock %}
</body>
</html>
